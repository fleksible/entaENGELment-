version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "FOKUS: deps"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5

  # directory muss auf den pnpm-Workspace-Root zeigen (pnpm-lock.yaml liegt dort);
  # mit "/ui-app" bumpte Dependabot nur ui-app/package.json, der Root-Lockfile
  # blieb stehen und jeder npm-PR failte an pnpm install --frozen-lockfile.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "FOKUS: deps"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "FOKUS: deps"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 3
