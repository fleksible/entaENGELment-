name: DeepJump Audit (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      allow-unsigned-status-skip:
        required: false
        type: boolean
        default: false
    secrets:
      ENTA_HMAC_SECRET:
        required: false

permissions:
  contents: read

concurrency:
  # Use a literal, reusable-specific group prefix — NOT `github.workflow`.
  # In a reusable workflow `github.workflow` resolves to the CALLER
  # (deepjump-ci.yml), so reusing it collides with the caller's group and, with
  # cancel-in-progress, cancels the very parent run that invokes this workflow.
  # A distinct group satisfies the workflow-posture contract (top-level
  # concurrency + cancel-in-progress) without the self-cancellation deadlock.
  group: deepjump-audit-reusable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deepjump-audit:
    runs-on: ubuntu-latest
    env:
      ENTA_HMAC_SECRET: ${{ secrets.ENTA_HMAC_SECRET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Dependencies
        run: |
          pip install pyyaml pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Mask HMAC secret
        shell: bash
        run: |
          if [ -n "${ENTA_HMAC_SECRET:-}" ]; then
            echo "::add-mask::$ENTA_HMAC_SECRET"
          fi

      - name: Check HMAC availability
        id: hmac
        shell: bash
        run: |
          # Graceful degradation: when the signing key is configured we emit and
          # verify a signed status; when it is absent we skip ONLY the signing
          # step (with a warning) instead of failing the whole audit. All
          # verification phases below (pointers, receipts, claims, tests,
          # snapshot, verify-json) always run and still gate the job.
          if [ -n "${ENTA_HMAC_SECRET:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "skip_allowed=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "skip_allowed=true" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.allow-unsigned-status-skip }}" = "true" ]; then
              echo "::notice title=DeepJump HMAC skipped::Signing key unavailable in dependency/fork PR context; signed status skipped."
            else
              echo "::warning title=DeepJump HMAC skipped::ENTA_HMAC_SECRET not configured; signed status emit/verify skipped. Add the repo secret to re-enable signing. Verification phases still ran."
            fi
          fi

      - name: "Phase 1: Verify Pointers"
        run: python3 tools/verify_pointers.py --strict

      - name: "Phase 1b: Receipt Lint (no duplicate keys)"
        run: python3 tools/receipt_lint.py --strict ark/p4/receipts

      - name: "Phase 1: Claim Lint"
        run: python3 tools/claim_lint.py --scope index,spec,receipts,tools

      - name: "Phase 1: Run Tests"
        run: pytest tests/ -v --tb=short

      - name: "Phase 2: Emit & Verify Status"
        if: ${{ steps.hmac.outputs.available == 'true' }}
        run: make status-verify STATUS=PASS H=0.85 DMI=4.8 PHI=0.75

      - name: "Phase 2: Record unsigned status skip"
        if: ${{ steps.hmac.outputs.skip_allowed == 'true' }}
        shell: bash
        run: |
          mkdir -p out/status out/badges
          cat > out/status/deepjump_status_skipped.json <<'JSON'
          {
            "status": "SKIPPED",
            "reason": "HMAC signing key unavailable in dependency/fork PR context; signed status emit/verify skipped.",
            "signature_type": "hmac-sha256",
            "signed": false
          }
          JSON
          printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="20"><rect width="120" height="20" fill="#555"/><rect x="70" width="50" height="20" fill="#dfb317"/><g fill="#fff" text-anchor="middle" font-family="Verdana" font-size="11"><text x="35" y="14">DeepJump</text><text x="95" y="14">SKIP</text></g></svg>' > out/badges/deepjump.svg

      - name: "Phase 3: Generate Snapshot Manifest"
        run: make snapshot SNAPSHOT_INPUTS='"seeds/*.yaml" "audit/*.yaml" "index/*.yaml"'

      - name: "Legacy: Verify JSON Receipts"
        run: make verify-json

      - name: Upload Audit Artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deepjump-audit-trail
          path: |
            out/status/deepjump_status.json
            out/status/deepjump_status_skipped.json
            out/badges/deepjump.svg
            out/verify.json
            out/snapshot_manifest.json
          if-no-files-found: warn
