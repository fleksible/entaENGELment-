name: Security Audit

# Enforceable breakpoint for the dependency-security outer pole.
# JS: pnpm audit (blocking on high+, moderate surfaced for visibility).
# Python: pip-audit against requirements.txt.
# Runs on dependency/lockfile changes, on a weekly schedule, and on demand.
on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "ui-app/package.json"
      - "packages/**/package.json"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "ui-app/package.json"
      - "packages/**/package.json"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-audit:
    name: JS dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit report (all severities, non-blocking)
        run: pnpm audit || true

      - name: Audit gate (fail on high+)
        run: pnpm audit --audit-level=high

  python-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit gate (requirements.txt)
        run: pip-audit -r requirements.txt
