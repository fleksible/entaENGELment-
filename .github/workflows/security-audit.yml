name: Security Audit

# Enforceable breakpoint for the dependency-security outer pole.
# JS: pnpm audit (blocking on high+, moderate surfaced for visibility).
# Python: pip-audit against requirements.txt.
# Runs on dependency/lockfile changes, on a weekly schedule, and on demand.
on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "ui-app/package.json"
      - "packages/**/package.json"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "ui-app/package.json"
      - "packages/**/package.json"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-audit:
    name: JS dependency audit (pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit report (all severities, non-blocking)
        run: pnpm audit || true

      - name: Audit gate (fail on high+)
        run: pnpm audit --audit-level=high

  python-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit gate (requirements.txt)
        run: pip-audit -r requirements.txt
