name: CI — JS/TS Workspace

on:
  push:
    paths:
      - "ui-app/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-js-workspace.yml"
  pull_request:
    paths:
      - "ui-app/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/ci-js-workspace.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Refresh lockfile without install scripts
        run: pnpm install --lockfile-only --ignore-scripts
      - name: Upload refreshed lockfile
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-pnpm-lock
          path: pnpm-lock.yaml
          if-no-files-found: error
