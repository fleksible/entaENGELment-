name: Temporary Lockfile Refresh

on:
  push:
    branches:
      - "claude/repo-quality-audit-n8mp31"
    paths:
      - "package.json"
      - ".github/workflows/temp-lockfile-refresh.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temp-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: "claude/repo-quality-audit-n8mp31"
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Refresh lockfile only
        run: pnpm install --lockfile-only --ignore-scripts
      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "fix(deps): refresh pnpm lockfile for Electron 43.1.0"
          git push origin HEAD:claude/repo-quality-audit-n8mp31
