name: Temporary Black Format

on:
  push:
    branches:
      - "claude/repo-quality-audit-n8mp31"
    paths:
      - ".github/workflows/temp-black-format.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: temp-black-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: "claude/repo-quality-audit-n8mp31"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install configured formatter
        run: pip install -r requirements-dev.txt
      - name: Apply Black
        run: black src/ tools/ tests/
      - name: Commit formatting if needed
        run: |
          if git diff --quiet; then
            echo "Black already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ tools/ tests/
          git commit -m "style: apply canonical Black formatting"
          git push origin HEAD:claude/repo-quality-audit-n8mp31
