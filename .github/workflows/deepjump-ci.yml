name: DeepJump CI

# DeepJump Protocol v1.2 CI Pipeline
# Verify → Status (HMAC) → Snapshot (strict) → Upload
# Reusable core lives in: deepjump-audit.reusable.yml

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking verification steps (VOID-002 closure)
  verify-lint:
    name: Verify Pointers & Lint (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pyyaml pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Pointers (blocking)
        run: python3 tools/verify_pointers.py --strict

      - name: Claim Lint (blocking)
        run: python3 tools/claim_lint.py --scope index,spec,receipts,tools --strict

      - name: Port Lint (blocking)
        run: python3 tools/port_lint.py

  deepjump-audit:
    needs: verify-lint
    uses: ./.github/workflows/deepjump-audit.reusable.yml
    secrets: inherit
    with:
      python-version: "3.11"
      # Pull requests may not have access to ENTA_HMAC_SECRET. Keep PR verification
      # strict for pointers/claims/tests, but allow signed-status emission to be skipped.
      allow-unsigned-status-skip: ${{ github.event_name == 'pull_request' }}
