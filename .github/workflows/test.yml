name: Tests

# Scope: This workflow covers Fractalsense (Python) and root JS tests.
# ui-app (Next.js) is covered by the ui-build job below.
# Core framework tests (tests/unit, tests/integration, tests/ethics) run in ci.yml.

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: npm run test:js

      - name: Run JavaScript tests with coverage
        run: npm run test:js:coverage

      - name: Upload JS coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: js-coverage-report
          path: coverage/js/
          retention-days: 14

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: Fractalsense/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Fractalsense/requirements-dev.txt

      - name: Run Python tests
        run: |
          cd Fractalsense
          python -m pytest --cov --cov-report=xml --cov-report=html

      - name: Upload Python coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: python-coverage-report-${{ matrix.python-version }}
          path: Fractalsense/htmlcov/
          retention-days: 14

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-app/package-lock.json

      - name: Install UI dependencies
        working-directory: ui-app
        run: npm ci

      - name: Build UI
        working-directory: ui-app
        run: npm run build

  all-tests-pass:
    name: All Tests Pass
    needs: [test-javascript, test-python, ui-build]
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: echo "All JavaScript, Python, and UI build checks passed successfully!"
