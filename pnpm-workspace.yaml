# EntaENGELment — pnpm workspace
# Additive JS/TS membrane over the existing islands. The Python domain
# (src/, tools/, tests/, bio_spiral_viewer/) remains sovereign and is NOT
# a workspace member — see SYNTHBIOSIS.md.
packages:
  - "ui-app"
  - "packages/*"

# Security floors for transitive dependencies. Keep these at the workspace
# root so the pnpm version pinned in package.json applies them consistently.
overrides:
  "form-data@>=4.0.0 <4.0.6": ">=4.0.6"
  "postcss@<8.5.10": ">=8.5.10"
  "js-yaml@<=4.1.1": ">=4.2.0"
  "undici@<6.27.0": "^6.27.0"
  "brace-expansion@<1.1.16": "^1.1.16"
  "brace-expansion@>=2.0.0 <2.1.2": "^2.1.2"
  "fast-uri@>=3.0.0 <=3.1.3": "3.1.4"
  "sharp@<0.35.0": "0.35.3"
