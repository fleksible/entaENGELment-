## approval gate

```
status: PROPOSED
approval_required: true
approver: Fleks
auto_close: false
```

To advance to `ACCEPTED`:
- Approver reviews and confirms the three scripts are recoverable.
- Approver specifies canonical seed or marks seed as intentionally null.
- Approver signs off on `EVIDENCE_CHAIN_BETSE.yml` path.

To advance to `REJECTED`:
- Approver determines scripts are irrecoverable; metrics must be re-generated
  from scratch or removed from the provenance chain.

