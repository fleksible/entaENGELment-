## context

`data/metrics/framework_metrics_v2_populated.csv` materialises BP-06/07/08
values (spatial_stability, kuramoto_r_bar, type_ii_fraction, spearman_rho)
transcribed from `EntaENGELment_Status_Roadmap_v1.docx`.

The sidecar `data/metrics/framework_metrics_v2_populated.meta.json` references
three pipeline scripts that are **not currently present** in the repository:

| script | role | status |
|--------|------|--------|
| `generate_synthetic_betse_patched.py` | synthetic BETSE run generator | MISSING |
| `betse_to_framework_bridge_v2.py` | BETSE output → framework metric bridge | MISSING |
| `betse_josephson_analysis.py` | Josephson / Kuramoto analysis | MISSING |

Until these scripts are present and runnable, the provenance chain is
**non-executable**: `claim_tag: SIMULATION_PROXY` is correctly set, but
anyone attempting to reproduce or audit the CSV cannot run the documented
pipeline.

This decision record gates any downstream use of the metrics as baselines
or verification evidence until the gap is resolved.

---

## decision

Pending Fleks approval, the following actions are proposed:

1. **Locate or recreate** the three missing scripts from local BETSE runs or
   the Roadmap working directory.
2. **Commit** them under `tools/betse/` (ANNEX path) with their own provenance
   headers.
3. **Create** `EVIDENCE_CHAIN_BETSE.yml` (linked below) documenting the
   canonical seed, run environment, and output hashes.
4. **Update** `data/metrics/framework_metrics_v2_populated.meta.json`:
   - set `seed` to canonical value (currently `null`)
   - add `evidence_chain: EVIDENCE_CHAIN_BETSE.yml`
5. **Optionally** re-run the pipeline to confirm CSV values match Roadmap
   figures; if discrepancies exist, create a new versioned CSV rather than
   overwriting.

