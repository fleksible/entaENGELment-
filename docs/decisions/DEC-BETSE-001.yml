---

## constraints

- `data/metrics/` is ANNEX — scripts should land in `tools/betse/` (also ANNEX).
- `data/receipts/` remains IMMUTABLE; no receipt is created by this DEC.
- Do **not** remove or overwrite `framework_metrics_v2_populated.csv` until
  a replacement with verified values is ready (G3: deletion-verbot).
- Claim tags must remain `SIMULATION_PROXY` until a biological BETSE run
  provides empirical values.

---

## blocking conditions

This DEC blocks:

- Using BP-06/07/08 metrics as hard thresholds in CI gates.
- Closing any VOID that cites these values as primary evidence.
- Treating `kuramoto_r_bar = 0.980` or `spearman_rho = -0.798/-0.910` as
  empirically confirmed results.

